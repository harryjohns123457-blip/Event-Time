<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn - Event Next Door</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <nav class="auth-navbar">
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div class="auth-container">
        <h2 class="auth-title">Log In</h2>

        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="loginEmail">Email:</label>
                <input type="email" id="loginEmail" name="email" required>
                <span class="error-message" id="emailError"></span>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password:</label>
                <input type="password" id="loginPassword" name="password" required>
                <span class="error-message" id="passwordError"></span>
            </div>
            <button type="submit" class="submit-button">Login</button>
            <span class="error-message" id="formError"></span>
        </form>

        <div class="auth-link">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <h3>Event Next Door</h3>
            <p>Email: info@eventnextdoor.com</p>
            <p>Phone: +254 741 938 327</p>
            <p>&copy; 2026 Event Next Door. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
