<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Event Next Door</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <nav class="auth-navbar">
        <a href="index.html" class="back-link">← Back to Home</a>
    </nav>

    <div class="auth-container">
        <h2 class="auth-title">Create Account</h2>

        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="regFirstName">First Name:</label>
                <input type="text" id="regFirstName" name="firstName" required>
                <span class="error-message"></span>
            </div>
            <div class="form-group">
                <label for="regLastName">Last Name:</label>
                <input type="text" id="regLastName" name="lastName" required>
                <span class="error-message"></span>
            </div>
            <div class="form-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" name="email" required>
                <span class="error-message"></span>
            </div>
            <div class="form-group">
                <label for="regPhone">Phone Number:</label>
                <input type="tel" id="regPhone" name="phone" required>
                <span class="error-message"></span>
            </div>
            <div class="form-group">
                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" name="password" required>
                <span class="error-message"></span>
            </div>
            <div class="form-group">
                <label for="regPasswordConfirm">Confirm Password:</label>
                <input type="password" id="regPasswordConfirm" name="passwordConfirm" required>
                <span class="error-message"></span>
            </div>
            <button type="submit" class="submit-button">Register</button>
            <span class="error-message" id="formError"></span>
        </form>

        <div class="auth-link">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <h3>Event Next Door</h3>
            <p>Email: info@eventnextdoor.com</p>
            <p>Phone: +254 741 938 327</p>
            <p>&copy; 2026 Event Next Door. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
