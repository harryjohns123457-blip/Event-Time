<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Event Next Door</title>
    <link rel="stylesheet" href="css/content.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        
        }
        .form-group {
            margin: 15px 0;
             margin: 15px 0;
             text-align: center;
            margin: 0 auto;
            display: block;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: rgb(246, 242, 242);
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff9800;
        }
        button {
            align-items:ceneter;
            padding: 10px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 40%;
            margin: 10px;
        }
        button:hover {
            background-color: #e68900;
        }
        .auth-link {
            text-align: center;
            margin-top: 15px;
            color: rgb(246, 242, 242);
        }
        .auth-link a {
            color: #ff9800;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav style="background-color: rgba(17, 6, 6, 0.96); padding: 15px; text-align: center;">
        <a href="index.html" style="color: rgb(246, 242, 242); text-decoration: none; font-weight: bold;">← Back to Home</a>
    </nav>

    <div class="auth-container">
        <h2 style="text-align: center; color: rgb(246, 242, 242); font-size: 50px;">Create Account</h2>

        <form id="registerForm">
            <div class="form-group">
                <label for="regFullName">Full Name:</label>
                <input type="text" id="regFullName" required>
            </div>
            <div class="form-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label for="regPhone">Phone Number:</label>
                <input type="tel" id="regPhone" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="form-group">
                <label for="regPasswordConfirm">Confirm Password:</label>
                <input type="password" id="regPasswordConfirm" required>
            </div>
            <button type="submit">Register</button>
        </form>

        <div class="auth-link">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

      <footer>
   
        <div class="footer-content">
        <h3>Event Next Door</h3>

        <p>Email: info@eventnextdoor.com</p>

        <p>Phone: +254 741 938 327</p>

        <p>&copy; 2026 Event Next Door. All rights reserved.</p>
        <footer/>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
